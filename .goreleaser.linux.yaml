# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: linux-amd64
    binary: subspace-relay-pcsc
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - ids:
      - linux-amd64
    formats:
      - tar.gz
    files:
      - LICENSE
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

nfpms:
  - id: linux-packages
    package_name: subspace-relay-pcsc
    ids:
      - linux-amd64
    formats:
      - deb
      - rpm
    file_name_template: >-
      {{ .PackageName }}_
      {{- .Version }}_
      {{- if eq .Arch "amd64" }}amd64{{ else }}{{ .Arch }}{{ end }}
    homepage: https://github.com/nvx/subspace-relay-pcsc
    maintainer: nvx
    description: Subspace Relay bridge for PC/SC smart-card readers.
    license: MIT
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/subspace-relay-pcsc/LICENSE

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
